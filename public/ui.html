<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Assistant Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; display: flex; flex-direction: column; }
    header { padding: 20px 24px; border-bottom: 1px solid #222; background: #111; flex-shrink: 0; }
    header h1 { font-size: 20px; font-weight: 600; color: #fff; }
    .status { font-size: 13px; margin-top: 4px; color: #888; }
    .status.connected { color: #4caf50; }
    .status.error { color: #f44336; }
    main { flex: 1; display: flex; gap: 16px; max-width: 1400px; width: 100%; margin: 0 auto; padding: 24px; overflow: hidden; }
    .chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
    .calendar-panel { width: 800px; flex-shrink: 0; overflow: hidden; border-radius: 8px; border: 1px solid #222; }
    .calendar-panel iframe { display: block; width: 100%; height: 100%; border: 0; }
    #output { flex: 1; overflow-y: auto; white-space: pre-wrap; line-height: 1.7; font-size: 15px; padding: 20px; background: #141414; border-radius: 8px; border: 1px solid #222; }
    .placeholder { color: #555; font-style: italic; }
    .log-entry { padding: 6px 0; border-bottom: 1px solid #1e1e1e; }
    .log-entry.user { color: #8ab4f8; font-weight: 500; text-align: right; }
    .log-entry.result { white-space: pre-wrap; line-height: 1.7; padding: 12px 0; }
    .log-entry.error { color: #f44336; }
    .input-area { display: flex; gap: 8px; margin-top: 12px; flex-shrink: 0; }
    .input-area input { flex: 1; padding: 12px 16px; border: 1px solid #333; border-radius: 8px; background: #1a1a1a; color: #e0e0e0; font-size: 15px; outline: none; }
    .input-area input:focus { border-color: #555; }
    .input-area button { padding: 12px 24px; border: none; border-radius: 8px; background: #2563eb; color: #fff; font-size: 15px; cursor: pointer; font-weight: 500; }
    .input-area button:hover { background: #1d4ed8; }
    .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>Personal Assistant Agent</h1>
    <div id="status" class="status">Connecting...</div>
  </header>
  <main>
    <div class="chat-panel">
      <div id="output"><span class="placeholder">Waiting for connection...</span></div>
      <div class="input-area">
        <input id="query" type="text" placeholder="Ask me anything..." autofocus />
        <button id="send" disabled>Send</button>
      </div>
    </div>
    <div class="calendar-panel">
      <iframe id="calendar" src="https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=Asia%2FShanghai&showPrint=0&mode=WEEK&showCalendars=0&showNav=0&showTitle=0&showTabs=0&showDate=0&src=ZDc5NmQzN2VhYjVjZjFlMzIwNmU1N2RiZGE4MzNkYTBjOTRlODczMGFhZjI2MzdkNmJiOWI3YmM5Y2E2MWJjYUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&color=%234285f4" style="border:solid 1px #777" width="800" height="600" frameborder="0" scrolling="no"></iframe>
    </div>
  </main>
  <script>
    const output = document.getElementById('output');
    const queryInput = document.getElementById('query');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');
    const calendarEl = document.getElementById('calendar');
    let ws;

    function reloadCalendar() {
      calendarEl.src = calendarEl.src;
    }

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = 'status' + (cls ? ' ' + cls : '');
    }

    function appendLog(text, cls) {
      const ph = output.querySelector('.placeholder');
      if (ph) ph.remove();
      const div = document.createElement('div');
      div.className = 'log-entry' + (cls ? ' ' + cls : '');
      div.textContent = text;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host + '/messages');
      ws.onopen = () => {
        setStatus('Connected', 'connected');
        sendBtn.disabled = false;
        output.innerHTML = '<span class="placeholder">Connected. Enter a question to begin research.</span>';
        output.scrollTop = output.scrollHeight;
      };
      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'status') {
          setStatus(data.text, data.cls || '');
        } else if (data.type === 'result') {
          appendLog(data.text, 'result');
          reloadCalendar();
        } else if (data.type === 'error') {
          const msg = data.query ? 'Error (' + data.query + '): ' + data.text : 'Error: ' + data.text;
          appendLog(msg, 'error');
          setStatus('Error', 'error');
        }
      };
      ws.onclose = () => {
        setStatus('Disconnected — reconnecting...', 'error');
        sendBtn.disabled = true;
        setTimeout(connect, 3000);
      };
      ws.onerror = () => {
        setStatus('Connection error', 'error');
      };
    }

    sendBtn.addEventListener('click', send);
    queryInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });

    function send() {
      const q = queryInput.value.trim();
      if (!q) return;
      queryInput.value = '';
      appendLog(q, 'user');
      ws.send(JSON.stringify({ query: q }));
    }

    connect();
  </script>
</body>
</html>
